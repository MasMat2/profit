<div class="edit-client-form">
  <div class="form-grid">
    <!-- Personal Information Section -->
    <div class="form-section">
      <h4 class="section-title">Información Personal</h4>
      
      <div class="form-row">
        <div class="form-group">
          <label for="firstName">Nombre(s)</label>
          <input 
            type="text" 
            id="firstName" 
            class="form-input" 
            [(ngModel)]="client.first_name" 
            placeholder="Ingrese el nombre"
            required>
        </div>

        <div class="form-group">
          <label for="lastName">Apellido(s)</label>
          <input 
            type="text" 
            id="lastName" 
            class="form-input" 
            [(ngModel)]="client.last_name" 
            placeholder="Ingrese el apellido"
            required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            [(ngModel)]="client.email" 
            placeholder="correo@ejemplo.com"
            required>
        </div>

        <div class="form-group">
          <label for="phone">Teléfono</label>
          <input 
            type="tel" 
            id="phone" 
            class="form-input" 
            [(ngModel)]="client.phone" 
            placeholder="(123) 456-7890">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="dob">Fecha de Nacimiento</label>
          <input 
            type="date" 
            id="dob" 
            class="form-input" 
            [(ngModel)]="client.dob">
        </div>

        <div class="form-group">
          <label for="gender">Género</label>
          <select 
            id="gender" 
            class="form-input" 
            [(ngModel)]="client.gender">
            <option value="">Seleccione...</option>
            <option *ngFor="let gender of genders" [value]="gender">{{ gender }}</option>
          </select>
        </div>
      </div>

      <div class="form-group full-width">
        <label for="address">Dirección</label>
        <textarea 
          id="address" 
          class="form-input" 
          [(ngModel)]="client.address" 
          placeholder="Dirección completa"
          rows="2"></textarea>
      </div>

      <h4 class="section-title">Información de Pago</h4>
      
      <div class="form-row">
        <div class="form-group">
          <label for="paymentMethod">Método de Pago Preferido</label>
          <select 
            id="paymentMethod" 
            class="form-input" 
            [(ngModel)]="client.payment_details.method">
            <option [value]="null">Seleccione...</option>
            <option *ngFor="let method of paymentMethods" [value]="method">{{ method }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="paymentReference">Referencia de Pago</label>
          <input 
            type="text" 
            id="paymentReference" 
            class="form-input" 
            [(ngModel)]="client.payment_details.reference" 
            placeholder="Número de tarjeta/cuenta (últimos 4 dígitos)">
        </div>
      </div>

      <div class="form-group full-width">
        <label for="medicalNotes">Notas Médicas</label>
        <textarea 
          id="medicalNotes" 
          class="form-input" 
          [(ngModel)]="client.medical_notes" 
          placeholder="Alergias, condiciones médicas, etc."
          rows="4"></textarea>
      </div>
    </div>
  </div>
</div>
