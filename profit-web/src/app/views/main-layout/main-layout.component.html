<div class="main-layout">
    
  <div class="sidebar">
    <div class="logo-container">
      <img src="assets/logo.png" alt="Profit-Syslam Logo">
    </div>

    <nav class="main-nav">

      <div *ngFor="let section of menuSections" class="menu-section">
        <h3 class="menu-section-header">{{ section.title }}</h3>


        <ng-container *ngFor="let item of section.items">
            <!-- Elemento de menú normal -->
            <a *ngIf="!item.children" class="nav-item" (click)="selectComponent(item.id)" [class.active]="activeMenu === item.id">
              <i [class]="item.icon"></i> {{ item.name }}
            </a>
            <!-- Elemento de menú con acordeón -->
            <div *ngIf="item.children" class="accordion">
              <div class="accordion-header" (click)="toggleAccordion(item.id)">
                <a class="nav-item">
                  <i [class]="item.icon"></i> {{ item.name }}
                </a>
                <i class="fas fa-chevron-down" [class.rotated]="accordions[item.id]"></i>
              </div>
              <div class="accordion-content" [class.show]="accordions[item.id]">
                <a *ngFor="let child of item.children" class="nav-item sub-item" (click)="selectComponent(child.id)" [class.active]="activeMenu === child.id">
                  {{ child.name }}
                </a>
              </div>
            </div>
          </ng-container>
        
    </div>

    </nav>


    <div class="sidebar-footer">
      <a class="nav-item theme-switcher" (click)="toggleTheme()" title="Cambiar tema">
        <i class="fas" [ngClass]="isDarkMode ? 'fa-sun' : 'fa-moon'"></i>
        <span>{{ isDarkMode ? 'Modo Claro' : 'Modo Oscuro' }}</span>
      </a>
      <a class="nav-item logout-btn" (click)="logout()">
        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
      </a>
    </div>

  </div>

  <div class="main-content">
    <div class="page-content-wrapper">
      <div [ngSwitch]="selectedComponent">
        <app-category-plans *ngSwitchCase="'category-plans'"></app-category-plans>
        <app-enroll-client *ngSwitchCase="'enroll-client'"></app-enroll-client>
        <app-access-client *ngSwitchCase="'access-client'"></app-access-client>
        <app-client-management *ngSwitchCase="'client-management'"></app-client-management>
    </div>
  </div>

  
</div>
