<div class="header-nav">
  <button 
    class="nav-button" 
    [class.active]="activeView === 'categoria'" 
    (click)="activeView = 'categoria'">
    Categoría
  </button>
  <button 
    class="nav-button" 
    [class.active]="activeView === 'planes'" 
    (click)="activeView = 'planes'">
    Planes
  </button>
</div>

<!-- Vista de Categorías -->
<div *ngIf="activeView === 'categoria'" class="card">
  <div class="category-grid">
    
    <!-- Columna Izquierda: Formulario de Creación -->
    <div class="form-column">
      <h3 class="column-header">Crear Categoría</h3>
      <form (ngSubmit)="saveCategory()" class="category-form">
        <div class="form-field">
          <label for="categoryName">Nombre de la Categoría</label>
          <input id="categoryName" type="text" [(ngModel)]="newCategory.name" name="categoryName" required>
        </div>
        <div class="form-field">
          <label for="categoryDesc">Descripción</label>
          <textarea id="categoryDesc" [(ngModel)]="newCategory.description" name="categoryDesc" rows="4"></textarea>
        </div>
        <button type="submit" class="save-button">Guardar Categoría</button>
      </form>
    </div>

    <!-- Columna Derecha: Lista de Categorías -->
    <div class="list-column">
      <h3 class="column-header">Categorías Existentes</h3>
      <div class="category-list">
        <div *ngFor="let category of existingCategories" class="list-item">
          <div class="item-info">
            <span class="item-name">{{ category.name }}</span>
            <span class="item-description">{{ category.description }}</span>
          </div>
          <div class="item-actions">
            <button class="action-btn" (click)="editCategory(category)"><i class="material-icons">edit</i></button>
            <button class="action-btn delete" (click)="deleteCategory(category)"><i class="material-icons">delete</i></button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>


<!-- Vista de Planes -->
<div *ngIf="activeView === 'planes'" class="card">
  <div class="category-grid">

    <!-- Columna Izquierda: Formulario de Creación de Plan -->
    <div class="form-column">
      <h3 class="column-header">Crear Plan</h3>
      <form (ngSubmit)="savePlan()" class="category-form">
        
        <div class="form-field">
          <label for="planCategory">Categoría</label>
          <select id="planCategory" [(ngModel)]="newPlan.category_id" name="planCategory" required>
            <option [ngValue]="undefined" disabled>Selecciona una categoría</option>
            <option *ngFor="let category of existingCategories" [ngValue]="category.id">
              {{ category.name }}
            </option>
          </select>
        </div>

        <div class="form-field">
          <label for="planName">Nombre del Plan</label>
          <input id="planName" type="text" [(ngModel)]="newPlan.name" name="planName" required>
        </div>

        <div class="form-field">
          <label for="planDesc">Descripción</label>
          <textarea id="planDesc" [(ngModel)]="newPlan.description" name="planDesc" rows="3"></textarea>
        </div>
        
        <div class="form-grid-2-col">
          <div class="form-field">
            <label for="planPrice">Precio (MXN)</label>
            <input id="planPrice" type="number" [(ngModel)]="newPlan.price" name="planPrice" required>
          </div>
          <div class="form-field">
            <label for="planDuration">Duración (días)</label>
            <input id="planDuration" type="number" [(ngModel)]="newPlan.duration" name="planDuration" required>
          </div>
        </div>

        <button type="submit" class="save-button">Guardar Plan</button>
      </form>
    </div>

    <!-- Columna Derecha: Lista de Planes -->
    <div class="list-column">
      <h3 class="column-header">Planes Existentes</h3>
      <div class="category-list">
        <div *ngFor="let plan of existingPlans" class="list-item">
          <div class="item-info">
            <span class="item-name">{{ plan.name }}</span>
            <span class="item-category">{{ getCategoryName(plan.category_id) }}</span>
            <span class="item-description">{{ plan.description }}</span>
          </div>
          <div class="item-details">
            <span class="item-price">${{ plan.price }}</span>
            <div class="item-actions">
              <button class="action-btn" (click)="editPlan(plan)"><i class="material-icons">edit</i></button>
              <button class="action-btn delete"(click)="deletePlan(plan)"><i class="material-icons">delete</i></button>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
