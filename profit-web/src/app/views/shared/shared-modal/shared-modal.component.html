<div class="modal-backdrop" (click)="onClose()">
  <div class="modal-content" [ngClass]="size"(click)="$event.stopPropagation()">
    <div class="modal-header">
      <!-- <h2 class="modal-title">Detalles de cliente</h2> -->
      <h2 class="modal-title">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align: middle;">
          <circle cx="12" cy="12" r="10" stroke="#888" stroke-width="2" fill="none"/>
          <path d="M12 11V17M12 7.5V8.5" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        {{ modalTitle }}
      </h2>
      <button class="close-button" (click)="onClose()">&times;</button>
    </div>
    <div class="modal-body">
      <ng-content></ng-content>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" (click)="onClose()">Cancelar</button>
      <button *ngIf="showSaveButton" class="btn-primary" (click)="onSave()">Guardar</button>
    </div>
  </div>
</div>
